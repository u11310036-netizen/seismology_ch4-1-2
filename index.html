<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震週期與斷層力學 - 互動式學習指南</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- MathJax for Beautiful LaTeX rendering -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" id="MathJax-script" async></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-in-out',
                        'pulse': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 0; background-color: #020617; }
        /* Smooth transition for range sliders */
        input[type="range"]::-webkit-slider-thumb {
            transition: transform 0.1s ease;
        }
        input[type="range"]::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Custom Beautiful SVGs Icons ---
        const Activity = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
        const Globe = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>;
        const Box = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>;
        const Target = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const Sliders = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>;
        const Waves = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>;
        const RotateCcw = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const Layers = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/></svg>;
        const HelpCircle = ({ size = 20, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>;

        // --- MathJax Re-Typeset Hook ---
        const useMathJax = (dependencies) => {
            useEffect(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    window.MathJax.typesetPromise().catch((err) => console.log('MathJax rendering failed: ', err));
                }
            }, dependencies);
        };

        // --- Components ---

        // 1. 基礎理論與地震週期
        const TheorySection = () => {
          const [activeStage, setActiveStage] = useState(0);

          const stages = [
            {
              title: "震間期 (Interseismic Stage)",
              desc: "佔據地震週期最長的時間（通常數十年至數千年）。在此階段，斷層面因強大摩擦力而被緊緊「鎖住」(Locked)，無法產生滑動；然而，板塊邊界遠處的構造地殼運動仍持續穩定進行，導致斷層帶周圍區域的彈性應變能無聲無息地持續累積，岩層逐漸發生顯著的剪切形變。",
              color: "bg-blue-500",
              stress: 30,
              highlight: "此階段是地表構造應變速率監測（如 GPS 觀測）的主要對象。"
            },
            {
              title: "震前期 (Preseismic Stage)",
              desc: "地震正式爆發前的短暫預備階段。此時局部應力已經極度逼近岩石的破裂臨界強度，摩擦強度開始軟化。微小的岩石破裂可能伴隨發生，部分地區會出現小規模的「前震 (Foreshocks)」，或者地表傾斜、地下水位與地球物理化學異常等微小形變與前兆效果。",
              color: "bg-yellow-500",
              stress: 85,
              highlight: "此階段的異常是科學家嘗試進行地震預報（Earthquake Prediction）的重要研究方向。"
            },
            {
              title: "震時相 (Coseismic Phase)",
              desc: "地震爆發的瞬間，斷層克服了極限靜摩擦力並發生劇烈的動態破裂與滑移。累積在岩體中的彈性應變能瞬間釋放，岩層快速「回跳」到較低的低應變狀態（部分釋放累積的彈性應變能）。釋放的應變能轉化為猛烈傳播的地震波，造成劇烈的地表搖晃。",
              color: "bg-red-500",
              stress: 100,
              highlight: "主要滑動通常在數秒至數十秒內完成，釋放出巨大的動能。"
            },
            {
              title: "震後期 (Postseismic Phase)",
              desc: "大地震結束後的應力重新分布與平衡調整階段。震源區周圍的地殼會逐漸調適新的應力狀態，其特徵為大量的「餘震 (Aftershocks)」頻繁發生，以及斷層深處無輻射地震波的緩慢滑移（稱為暫態餘滑 Afterslip），或地底孔隙流體的擴散流動。",
              color: "bg-green-500",
              stress: 15,
              highlight: "震後期形變可能持續數週至數年，使區域地殼應力逐漸過渡到下一次震間期循環。"
            }
          ];

          useMathJax([activeStage]);

          return (
            <div className="space-y-8 animate-fade-in">
              {/* Elastic Rebound Card */}
              <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
                <h3 className="text-2xl font-bold text-teal-400 mb-4 flex items-center gap-2">
                  <Activity size={28} /> 什麼是彈性回跳理論？ (Elastic Rebound Theory)
                </h3>
                <p className="text-slate-300 leading-relaxed mb-6 text-base md:text-lg">
                  由地球物理學家 <strong>H. F. Reid</strong> 於 1906 年舊金山大地震後，基於對聖安德烈亞斯（San Andreas）斷層的地表測量觀測所提出。這是現代地震學解析構造地震起因的最核心理論。
                </p>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                  <div className="bg-slate-900 p-5 rounded-xl border border-slate-700 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1.5 h-full bg-teal-500"></div>
                      <h4 className="text-teal-300 font-bold mb-2 text-lg flex items-center gap-2">
                        <span>1. 應力累積與形變 (Stress Accumulation)</span>
                      </h4>
                      <p className="text-sm text-slate-400 leading-relaxed">
                        構造板塊移動時，斷層兩側岩層受強大靜摩擦力阻擋而「鎖固」無法動彈。這使斷層附近的岩體發生緩慢的彈性形變，能量就像拉伸的橡皮筋一樣累積，地表測量會發現斷層兩側地體逐漸向相反方向彎曲。
                      </p>
                  </div>
                  <div className="bg-slate-900 p-5 rounded-xl border border-slate-700 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                      <h4 className="text-blue-300 font-bold mb-2 text-lg flex items-center gap-2">
                        <span>2. 破裂、回跳與應變釋放 (Rebound & Release)</span>
                      </h4>
                      <p className="text-sm text-slate-400 leading-relaxed">
                        當應力持續攀升並超越岩層的臨界破裂強度，或大於斷層面鎖固摩擦力時，斷層會瞬間脆性破裂並產生快速錯動。岩體隨即猛烈「回跳」至低應變狀態（注意：此過程<strong>僅部分釋放</strong>累積應變，仍有殘留應力），並將釋放的彈性應變能轉化為震波。
                      </p>
                  </div>
                </div>
              </div>

              {/* Seismic Cycle Card */}
              <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
                <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                  <h3 className="text-xl font-bold text-orange-400 flex items-center gap-2">
                    <RotateCcw size={24} /> 構造地震週期 (Seismic Cycle)
                  </h3>
                  <span className="text-xs bg-slate-700 text-slate-300 px-3 py-1 rounded-full">
                    點擊 1 ~ 4 步驟查看應力變化與階段說明
                  </span>
                </div>
                
                {/* Timeline Buttons */}
                <div className="relative flex justify-between items-center mb-10 px-6">
                  <div className="absolute left-6 right-6 h-1 bg-slate-700 top-1/2 -translate-y-1/2 z-0"></div>
                  {stages.map((stage, idx) => (
                    <button
                      key={idx}
                      onClick={() => setActiveStage(idx)}
                      className={`relative z-10 w-12 h-12 rounded-full flex flex-col items-center justify-center font-bold transition-all duration-300 ${
                        activeStage === idx 
                          ? `${stage.color} text-white scale-125 shadow-[0_0_20px_rgba(255,255,255,0.4)] ring-4 ring-slate-800` 
                          : 'bg-slate-900 text-slate-400 hover:bg-slate-700 border border-slate-700 hover:text-white'
                      }`}
                    >
                      <span className="text-base">{idx + 1}</span>
                    </button>
                  ))}
                </div>

                {/* Info Display Area */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  <div className="lg:col-span-7 p-5 bg-slate-900 rounded-xl border border-slate-700 flex flex-col justify-between">
                    <div>
                      <span className={`text-xs px-2.5 py-1 rounded-full font-bold uppercase ${
                        activeStage === 2 ? 'bg-red-500/20 text-red-400 animate-pulse' : 'bg-slate-800 text-slate-300'
                      }`}>
                        Stage {activeStage + 1}
                      </span>
                      <h4 className={`text-xl font-bold mt-3 mb-3 flex items-center gap-2 ${activeStage === 2 ? 'text-red-400' : 'text-slate-100'}`}>
                        <div className={`w-3.5 h-3.5 rounded-full ${stages[activeStage].color}`}></div>
                        {stages[activeStage].title}
                      </h4>
                      <p className="text-slate-300 text-sm md:text-base leading-relaxed mb-4">{stages[activeStage].desc}</p>
                    </div>
                    <div className="bg-slate-950 p-3 rounded-lg border border-slate-800 text-xs text-orange-400 font-medium">
                      💡 關鍵地質意涵：{stages[activeStage].highlight}
                    </div>
                  </div>

                  <div className="lg:col-span-5 bg-slate-900 rounded-xl border border-slate-700 p-5 flex flex-col justify-center">
                    <div className="flex justify-between text-sm text-slate-400 mb-3 font-semibold">
                      <span>地殼累積彈性應力能</span>
                      <span className={`${activeStage === 2 ? 'text-red-400 animate-pulse' : 'text-slate-200'}`}>
                        {stages[activeStage].stress}% {activeStage === 2 && " (臨界破裂破壞)"}
                      </span>
                    </div>
                    
                    {/* Progress Bar */}
                    <div className="w-full bg-slate-950 h-5 rounded-full overflow-hidden border border-slate-800 p-0.5">
                      <div 
                        className={`h-full rounded-full transition-all duration-1000 ${stages[activeStage].color}`}
                        style={{ width: `${stages[activeStage].stress}%` }}
                      ></div>
                    </div>

                    <div className="mt-6 space-y-3 text-xs text-slate-400">
                      <div className="flex justify-between border-b border-slate-800 pb-1.5">
                        <span>板塊運動狀態:</span>
                        <span className="text-slate-200">持續穩定推擠中</span>
                      </div>
                      <div className="flex justify-between border-b border-slate-800 pb-1.5">
                        <span>觀測指標:</span>
                        <span className="text-slate-200">地表應變率、微震活動</span>
                      </div>
                      <div className="flex justify-between">
                        <span>應力釋放速率:</span>
                        <span className="text-slate-200">{activeStage === 2 ? "瞬間 (秒級級釋放)" : activeStage === 3 ? "緩慢鬆弛 (震後餘滑)" : "極其微弱"}</span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // 2. 斷層幾何與類型
        const FaultSection = () => {
          const [faultType, setFaultType] = useState('normal');

          const getBlockStyle = (type, isHangingWall) => {
            const baseStyle = { transition: 'transform 1s cubic-bezier(0.4, 0, 0.2, 1)' };
            if (type === 'normal') {
              return isHangingWall ? { ...baseStyle, transform: 'translate(10px, 18px)' } : baseStyle;
            } else if (type === 'reverse') {
              return isHangingWall ? { ...baseStyle, transform: 'translate(-10px, -18px)' } : baseStyle;
            } else if (type === 'strike-slip') {
              return isHangingWall ? { ...baseStyle, transform: 'translate(0px, 0px) scale(0.95)' } : { ...baseStyle, transform: 'translate(12px, 0px) scale(1.05)' };
            }
            return baseStyle;
          };

          useMathJax([faultType]);

          return (
            <div className="space-y-8 animate-fade-in">
              <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
                <h3 className="text-xl font-bold text-blue-400 mb-4 flex items-center gap-2">
                  <Box size={24} /> 斷層幾何參數 (Fault Geometry)
                </h3>
                <p className="text-sm text-slate-300 mb-4 leading-relaxed">
                  描述一個理想的三維空間平面斷層，地震學與構造地質學定義了三個最主要的角度參數。透過這些參數，我們能完全掌握斷層面在地底的延伸與錯動方向：
                </p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                  <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 border-t-4 border-t-blue-500">
                    <h4 className="font-bold text-slate-100 mb-2 text-base flex justify-between items-center">
                      <span>走向 (Strike, $\phi_f$)</span>
                      <span className="text-xs text-blue-400 font-mono">0° ~ 360°</span>
                    </h4>
                    <p className="text-slate-400 leading-relaxed">斷層面與水平地面的交線。其夾角是以正北方為起點（$0^\circ$）順時針旋轉至交線延伸方向的角度。此角度定義了斷層在二維地表地圖上的宏觀分佈走向。</p>
                  </div>
                  <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 border-t-4 border-t-purple-500">
                    <h4 className="font-bold text-slate-100 mb-2 text-base flex justify-between items-center">
                      <span>傾角 (Dip, $\delta$)</span>
                      <span className="text-xs text-purple-400 font-mono">0° ~ 90°</span>
                    </h4>
                    <p className="text-slate-400 leading-relaxed">斷層面與水平面之間的最大夾角。與走向線垂直，指向斷層面往地下深處傾斜的方向。夾角越小表示斷層面越平緩（如低角度逆衝斷層）。</p>
                  </div>
                  <div className="bg-slate-900 p-4 rounded-xl border border-slate-700 border-t-4 border-t-pink-500">
                    <h4 className="font-bold text-slate-100 mb-2 text-base flex justify-between items-center">
                      <span>滑移角 (Rake/Slip, $\lambda$)</span>
                      <span className="text-xs text-pink-400 font-mono">-180° ~ 180°</span>
                    </h4>
                    <p className="text-slate-400 leading-relaxed">在斷層面上，上盤（Hanging wall）相對於下盤（Footwall）沿走向線發生滑移運動的相對方向角。以走向線方向為起算基準點測量得出的角度。</p>
                  </div>
                </div>
              </div>

              <div className="bg-slate-800 p-6 rounded-2xl shadow-lg border border-slate-700">
                <h3 className="text-xl font-bold text-green-400 mb-6 flex items-center gap-2">
                  <Layers size={24} /> 三大基本斷層類型互動模擬
                </h3>
                
                <div className="flex flex-col lg:flex-row gap-8">
                  <div className="flex flex-col gap-4 w-full lg:w-1/3">
                    <button 
                      onClick={() => setFaultType('normal')}
                      className={`p-4 rounded-xl text-left border-l-4 transition-all ${
                        faultType === 'normal' 
                          ? 'bg-green-950/40 text-white border-l-green-500 border-slate-700 shadow-md shadow-green-900/10' 
                          : 'bg-slate-700/50 text-slate-300 border-l-slate-600 hover:bg-slate-700 border-y border-r border-slate-600'
                      }`}
                    >
                      <div className="font-bold text-lg text-green-400">正斷層 (Normal Fault)</div>
                      <div className="text-xs opacity-90 font-mono mt-1 text-slate-300">
                        滑移角 $\lambda \approx -90^\circ$ ($270^\circ$) | 上盤相對向下滑動
                      </div>
                      <div className="text-xs text-slate-400 mt-2 leading-relaxed">
                        受地殼張力（Tension）拉伸作用引起，通常發生在板塊張裂或大陸裂谷（如東非大裂谷）。
                      </div>
                    </button>
                    
                    <button 
                      onClick={() => setFaultType('reverse')}
                      className={`p-4 rounded-xl text-left border-l-4 transition-all ${
                        faultType === 'reverse' 
                          ? 'bg-red-950/40 text-white border-l-red-500 border-slate-700 shadow-md shadow-red-900/10' 
                          : 'bg-slate-700/50 text-slate-300 border-l-slate-600 hover:bg-slate-700 border-y border-r border-slate-600'
                      }`}
                    >
                      <div className="font-bold text-lg text-red-400">逆衝斷層 (Thrust/Reverse Fault)</div>

                        className="w-full accent-teal-500 h-1.5 bg-slate-900 rounded-lg cursor-pointer"
                      />
                      <p className="text-[11px] text-slate-500 mt-1">典型地殼硬質基岩介於 $30 \sim 32 \text{ GPa}$</p>
                    </div>
                    
                    <div>
                      <label className="flex justify-between text-sm text-slate-300 mb-1 font-semibold">
                        <span>平均相對滑動位移量 ($\bar{D}$)</span>
                        <span className="text-teal-400 font-mono text-base">{slip.toFixed(1)} m</span>
                      </label>
                      <input 
                        type="range" min="0.1" max="20" step="0.1" value={slip} onChange={(e) => setSlip(Number(e.target.value))}
                        className="w-full accent-teal-500 h-1.5 bg-slate-900 rounded-lg cursor-pointer"
                      />
                      <p className="text-[11px] text-slate-500 mt-1">地震錯動滑移的斷層面平均位移值</p>
                    </div>

                    <div>
                      <label className="flex justify-between text-sm text-slate-300 mb-1 font-semibold">
                        <span>斷層破裂總面積 ($S$)</span>
                        <span className="text-teal-400 font-mono text-base">{area} km²</span>
                      </label>
                      <input 
                        type="range" min="10" max="5000" step="10" value={area} onChange={(e) => setArea(Number(e.target.value))}
                        className="w-full accent-teal-500 h-1.5 bg-slate-900 rounded-lg cursor-pointer"
                      />
                      <p className="text-[11px] text-slate-500 mt-1">破裂區長度 $\times$ 破裂面深度（$1 \text{ km}^2 = 10^6 \text{ m}^2$）</p>
                    </div>
                  </div>

                  <div className="bg-slate-900 rounded-xl p-6 border border-slate-700 flex flex-col justify-center items-center text-center relative overflow-hidden">
                    <div className="absolute top-0 right-0 p-3 opacity-[0.03] select-none pointer-events-none">
                      <Activity size={180} />
                    </div>
                    <div className="relative z-10 w-full">
                      <h4 className="text-slate-400 text-sm font-bold mb-1 uppercase tracking-wider">地震矩 (Seismic Moment, $M_0$)</h4>
                      <div className="text-2xl md:text-3xl font-mono text-white mb-6 font-bold bg-slate-950/60 py-3 rounded-lg border border-slate-800">
                        {M0.toExponential(2)} <span className="text-sm text-slate-500 font-sans">N·m</span>
                      </div>
                      
                      <div className="h-px w-full bg-slate-800 mb-6"></div>

                      <h4 className="text-slate-400 text-sm font-bold mb-1 uppercase tracking-wider">計算地震矩規模 (Moment Magnitude, $M_w$)</h4>
                      <div className={`text-6xl md:text-7xl font-extrabold font-mono transition-colors duration-300 ${
                        Mw >= 7 ? 'text-red-500 shadow-red-950/30' : Mw >= 6 ? 'text-orange-500' : 'text-teal-400'
                      }`}>
                        {Mw}
                      </div>
                      <p className="text-[11px] text-slate-500 mt-4 max-w-[280px] mx-auto leading-relaxed">
                        與早期飽和的震級計量不同，地震矩規模能精確量度至規模 $9.0+$ 以上特大型巨震能量。
                      </p>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // --- Main App Component ---
        function App() {
          const [activeTab, setActiveTab] = useState(0);

          const tabs = [
            { name: '基礎理論與地震週期', icon: <Activity size={18} /> },
            { name: '斷層幾何與類型', icon: <Box size={18} /> },
            { name: '震源機制與地質力學', icon: <Globe size={18} /> }
          ];

          return (
            <div className="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-teal-500/30">
              
              {/* Header */}
              <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
                <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                  <div className="flex items-center gap-3">
                    <div className="bg-gradient-to-br from-teal-400 to-blue-600 p-2.5 rounded-xl text-slate-900 shadow-lg shadow-teal-500/10">
                      <Waves size={28} />
                    </div>
                    <div>
                      <h1 className="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-400 tracking-tight">
                        地震週期與斷層破裂力學
                      </h1>
                      <p className="text-slate-400 text-xs md:text-sm mt-1">互動式地力學與地震學核心概念學習平台 (10 大重點架構)</p>
                    </div>
                  </div>
                </div>

                {/* Tab Navigation */}
                <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
                  <div className="flex space-x-1 sm:space-x-4 overflow-x-auto pb-px">
                    {tabs.map((tab, idx) => (
                      <button
                        key={idx}
                        onClick={() => setActiveTab(idx)}
                        className={`flex items-center gap-2 px-4 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-all ${
                          activeTab === idx 
                            ? 'border-teal-400 text-teal-400 bg-teal-500/5' 
                            : 'border-transparent text-slate-400 hover:text-slate-200 hover:border-slate-700'
                        }`}
                      >
                        {tab.icon}
                        {tab.name}
                      </button>
                    ))}
                  </div>
                </div>
              </header>

              {/* Main Content Area */}
              <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 min-h-[70vh]">
                {activeTab === 0 && <TheorySection />}
                {activeTab === 1 && <FaultSection />}
                {activeTab === 2 && <MechanicsSection />}
              </main>

              {/* Footer */}
              <footer className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 text-center text-slate-500 text-xs border-t border-slate-800 mt-12 space-y-2">
                <p>本教學介面整合自彈性回跳理論、地震週期四階段、走向/傾角/滑移角、節面/輔助面、雙力偶輻射機制及球影投影（沙灘球）。</p>
                <p className="text-slate-600">© 地球物理與構造地震學教育教材</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
