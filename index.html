<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>地震週期與斷層破裂力學</title>

  <!-- TailwindCSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="bg-slate-950">
  <div id="root"></div>

  <script type="text/babel">

    const {
      Activity,
      Globe,
      Box,
      Target,
      Sliders,
      Waves
    } = lucide;

    // Utils
    const RotateCcw = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
        viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    );

    const Layers = ({ size }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
        viewBox="0 0 24 24" fill="none" stroke="currentColor"
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="12 2 2 7 12 12 22 7 12 2"/>
        <polyline points="2 12 12 17 22 12"/>
        <polyline points="2 17 12 22 22 17"/>
      </svg>
    );

    // ===========================
    // Theory Section
    // ===========================
    const TheorySection = () => {

      const [activeStage, setActiveStage] = React.useState(0);

      const stages = [
        {
          title: "震間期 (Interseismic)",
          desc: "斷層被摩擦力鎖住，但地殼仍持續累積應變能。",
          color: "bg-blue-500",
          stress: 30
        },
        {
          title: "震前期 (Preseismic)",
          desc: "應力接近破裂臨界點。",
          color: "bg-yellow-500",
          stress: 85
        },
        {
          title: "震時相 (Coseismic)",
          desc: "斷層快速滑動並釋放地震波。",
          color: "bg-red-500",
          stress: 100
        },
        {
          title: "震後期 (Postseismic)",
          desc: "餘震與餘滑逐漸調整應力。",
          color: "bg-green-500",
          stress: 15
        }
      ];

      return (
        <div className="space-y-8 animate-fade-in">

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h3 className="text-xl font-bold text-teal-400 mb-4 flex items-center gap-2">
              <Activity size={24}/> 彈性回跳理論
            </h3>

            <p className="text-slate-300 leading-relaxed">
              地震是由於斷層兩側岩層累積彈性應變能，
              當超過摩擦力限制時，斷層瞬間滑動並釋放地震波。
            </p>
          </div>

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">

            <h3 className="text-xl font-bold text-orange-400 mb-6 flex items-center gap-2">
              <RotateCcw size={24}/> 地震週期
            </h3>

            <div className="relative flex justify-between items-center mb-8 px-4">
              <div className="absolute left-4 right-4 h-1 bg-slate-700 top-1/2 -translate-y-1/2"></div>

              {stages.map((stage, idx) => (
                <button
                  key={idx}
                  onClick={() => setActiveStage(idx)}
                  className={`relative z-10 w-10 h-10 rounded-full font-bold transition-all
                  ${
                    activeStage === idx
                    ? `${stage.color} text-white scale-125`
                    : 'bg-slate-600 text-slate-300'
                  }`}
                >
                  {idx + 1}
                </button>
              ))}
            </div>

            <div className="grid md:grid-cols-2 gap-6">

              <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                <h4 className="text-lg font-bold mb-2">
                  {stages[activeStage].title}
                </h4>

                <p className="text-slate-400">
                  {stages[activeStage].desc}
                </p>
              </div>

              <div className="bg-slate-900 p-4 rounded-xl border border-slate-700">
                <div className="flex justify-between mb-2 text-sm text-slate-400">
                  <span>累積應變能</span>
                  <span>{stages[activeStage].stress}%</span>
                </div>

                <div className="w-full bg-slate-700 h-4 rounded-full overflow-hidden">
                  <div
                    className={`h-full ${stages[activeStage].color}`}
                    style={{ width: `${stages[activeStage].stress}%` }}
                  ></div>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    };

    // ===========================
    // Fault Section
    // ===========================
    const FaultSection = () => {

      const [faultType, setFaultType] = React.useState('normal');

      return (
        <div className="space-y-8 animate-fade-in">

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">

            <h3 className="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2">
              <Box size={24}/> 斷層類型
            </h3>

            <div className="flex flex-col md:flex-row gap-6">

              <div className="flex flex-col gap-3 md:w-1/3">

                <button
                  onClick={() => setFaultType('normal')}
                  className={`p-3 rounded-lg text-left
                  ${
                    faultType === 'normal'
                    ? 'bg-green-600'
                    : 'bg-slate-700'
                  }`}
                >
                  正斷層
                </button>

                <button
                  onClick={() => setFaultType('reverse')}
                  className={`p-3 rounded-lg text-left
                  ${
                    faultType === 'reverse'
                    ? 'bg-red-600'
                    : 'bg-slate-700'
                  }`}
                >
                  逆斷層
                </button>

                <button
                  onClick={() => setFaultType('strike-slip')}
                  className={`p-3 rounded-lg text-left
                  ${
                    faultType === 'strike-slip'
                    ? 'bg-yellow-600'
                    : 'bg-slate-700'
                  }`}
                >
                  平移斷層
                </button>

              </div>

              <div className="bg-slate-900 rounded-xl border border-slate-700 p-6 flex-1">

                {faultType === 'normal' && (
                  <p className="text-green-400">
                    上盤向下滑動，地殼拉張。
                  </p>
                )}

                {faultType === 'reverse' && (
                  <p className="text-red-400">
                    上盤向上推擠，地殼縮短。
                  </p>
                )}

                {faultType === 'strike-slip' && (
                  <p className="text-yellow-400">
                    兩側水平錯動。
                  </p>
                )}

              </div>

            </div>

          </div>

        </div>
      );
    };

    // ===========================
    // Mechanics Section
    // ===========================
    const MechanicsSection = () => {

      const [mu, setMu] = React.useState(30);
      const [slip, setSlip] = React.useState(1.5);
      const [area, setArea] = React.useState(400);

      const calculateMagnitude = () => {
        const M0 = mu * 1e9 * slip * (area * 1e6);
        const Mw = (2 / 3) * Math.log10(M0) - 6.07;

        return {
          M0: M0.toExponential(2),
          Mw: Mw.toFixed(2)
        };
      };

      const { M0, Mw } = calculateMagnitude();

      return (
        <div className="space-y-8 animate-fade-in">

          <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">

            <h3 className="text-xl font-bold text-yellow-400 mb-6 flex items-center gap-2">
              <Sliders size={24}/> 地震矩計算機
            </h3>

            <div className="grid md:grid-cols-2 gap-8">

              <div className="space-y-5">

                <div>
                  <label className="flex justify-between mb-1">
                    <span>剛性模數 μ</span>
                    <span>{mu} GPa</span>
                  </label>

                  <input
                    type="range"
                    min="10"
                    max="60"
                    value={mu}
                    onChange={(e) => setMu(Number(e.target.value))}
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="flex justify-between mb-1">
                    <span>位移量 D</span>
                    <span>{slip} m</span>
                  </label>

                  <input
                    type="range"
                    min="0.1"
                    max="20"
                    step="0.1"
                    value={slip}
                    onChange={(e) => setSlip(Number(e.target.value))}
                    className="w-full"
                  />
                </div>

                <div>
                  <label className="flex justify-between mb-1">
                    <span>破裂面積 S</span>
                    <span>{area} km²</span>
                  </label>

                  <input
                    type="range"
                    min="10"
                    max="5000"
                    step="10"
                    value={area}
                    onChange={(e) => setArea(Number(e.target.value))}
                    className="w-full"
                  />
                </div>

              </div>

              <div className="bg-slate-900 rounded-xl p-6 text-center">

                <h4 className="text-slate-400 mb-2">
                  地震矩 M₀
                </h4>

                <div className="text-3xl font-mono text-white mb-6">
                  {M0}
                </div>

                <h4 className="text-slate-400 mb-2">
                  地震矩規模 Mw
                </h4>

                <div className="text-5xl font-bold text-teal-400">
                  {Mw}
                </div>

              </div>

            </div>

          </div>

        </div>
      );
    };

    // ===========================
    // Main App
    // ===========================
    function App() {

      const [activeTab, setActiveTab] = React.useState(0);

      const tabs = [
        { name: '基礎理論', icon: <Activity size={18}/> },
        { name: '斷層類型', icon: <Box size={18}/> },
        { name: '震源力學', icon: <Globe size={18}/> }
      ];

      return (
        <div className="min-h-screen bg-slate-950 text-slate-200">

          <header className="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">

            <div className="max-w-6xl mx-auto px-6 py-6">

              <div className="flex items-center gap-3">

                <div className="bg-gradient-to-br from-teal-400 to-blue-600 p-2 rounded-lg">
                  <Waves size={28}/>
                </div>

                <div>
                  <h1 className="text-2xl font-bold text-teal-400">
                    地震週期與斷層破裂力學
                  </h1>

                  <p className="text-slate-400 text-sm">
                    互動式學習指南
                  </p>
                </div>

              </div>

            </div>

            <div className="max-w-6xl mx-auto px-6">
              <div className="flex gap-4">

                {tabs.map((tab, idx) => (
                  <button
                    key={idx}
                    onClick={() => setActiveTab(idx)}
                    className={`flex items-center gap-2 px-4 py-3 border-b-2
                    ${
                      activeTab === idx
                      ? 'border-teal-400 text-teal-400'
                      : 'border-transparent text-slate-400'
                    }`}
                  >
                    {tab.icon}
                    {tab.name}
                  </button>
                ))}

              </div>
            </div>

          </header>

          <main className="max-w-6xl mx-auto px-6 py-8">

            {activeTab === 0 && <TheorySection />}
            {activeTab === 1 && <FaultSection />}
            {activeTab === 2 && <MechanicsSection />}

          </main>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

  </script>
</body>
</html>
