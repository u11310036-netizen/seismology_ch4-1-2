<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學：震源機制與地震矩力學分析系統</title>
    <style>
        /* 基礎全域樣式，確保與任何平台不衝突 */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f6f8fa;
            color: #24292f;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border: 1px solid #d0d7de;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 24px;
            color: #0969da;
            margin-top: 0;
            border-bottom: 2px solid #d0d7de;
            padding-bottom: 10px;
        }
        .intro {
            line-height: 1.6;
            color: #57606a;
            margin-bottom: 20px;
        }
        
        /* 互動控制面板 */
        .interactive-panel {
            background-color: #f1f8ff;
            border: 1px solid #b4d4ff;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .panel-title {
            font-weight: bold;
            color: #032f62;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .control-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
        }
        .btn {
            background-color: #2da44e;
            color: white;
            border: 1px solid rgba(27,31,36,0.15);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }
        .btn:hover { background-color: #2c974b; }
        .btn-secondary { background-color: #0969da; }
        .btn-secondary:hover { background-color: #0550ae; }

        /* 畫布與防黑屏顯示區 */
        .visual-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #22272e;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #444c56;
        }
        .beachball-canvas {
            background: #2d333b;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            transition: transform 0.5s ease;
        }
        .status-text {
            color: #768390;
            font-size: 13px;
            margin-top: 12px;
            font-family: monospace;
        }

        /* GitHub 經典防跑版代碼高亮區 */
        .code-block-wrapper {
            background-color: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Fira Code', Consolas, 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            text-align: left;
            overflow-x: auto;
            border: 1px solid #30363d;
        }
        .code-header {
            color: #58a6ff;
            font-weight: bold;
            border-bottom: 1px solid #21262d;
            padding-bottom: 8px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
        }
        pre { margin: 0; white-space: pre; }
        .keyword { color: #ff7b72; }
        .comment { color: #8b949e; }
        .number { color: #79c0ff; }
